# Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#Register with Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

microservice.payment-service.endpoints.endpoint.uri:http://payment-service/payment/doPayment

microservice.order-service.endpoints.endpoint.uri:http://order-service/order/orderId

payment.service.url=http://payment-service/payment
